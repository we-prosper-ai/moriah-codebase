version: '3.8'

services:
  transcript-sanitizer:
    build: .
    ports:
      - "4001:4001"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=4001
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
