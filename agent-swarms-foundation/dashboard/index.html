<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AntiGravity Agent Swarms Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        header p {
            color: #666;
            font-size: 14px;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        .status-indicator.healthy {
            background: #10b981;
        }

        .status-indicator.warning {
            background: #f59e0b;
        }

        .status-indicator.error {
            background: #ef4444;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .team-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .team-card h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 15px;
            text-transform: capitalize;
        }

        .agents-list {
            list-style: none;
        }

        .agent-item {
            padding: 10px;
            border-left: 3px solid #667eea;
            margin-bottom: 10px;
            background: #f9fafb;
            border-radius: 4px;
        }

        .agent-name {
            font-weight: 600;
            color: #333;
            text-transform: capitalize;
        }

        .agent-status {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 5px;
        }

        .status-badge.idle {
            background: #e0e7ff;
            color: #4f46e5;
        }

        .status-badge.working {
            background: #dbeafe;
            color: #0284c7;
        }

        .status-badge.blocked {
            background: #fee2e2;
            color: #dc2626;
        }

        .queue-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .queue-section h3 {
            color: #333;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .job-item {
            padding: 15px;
            border-left: 4px solid #667eea;
            margin-bottom: 10px;
            background: #f9fafb;
            border-radius: 4px;
        }

        .job-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .job-team {
            font-size: 12px;
            color: #666;
        }

        .job-status {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .job-status span {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 600;
            margin-left: 5px;
        }

        .job-status span.pending {
            background: #fef3c7;
            color: #92400e;
        }

        .job-status span.in_progress {
            background: #dbeafe;
            color: #0284c7;
        }

        .job-status span.blocked {
            background: #fee2e2;
            color: #dc2626;
        }

        .job-status span.complete {
            background: #d1fae5;
            color: #065f46;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .refresh-btn:hover {
            background: #5568d3;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 18px;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <span class="status-indicator healthy"></span>
                AntiGravity Agent Swarms
            </h1>
            <p>Real-time coordination dashboard — Tina's central command center</p>
            <button class="refresh-btn" onclick="refreshDashboard()">Refresh</button>
        </header>

        <div id="error-container"></div>

        <div class="teams-grid" id="teams-grid">
            <div class="loading">Loading agent status...</div>
        </div>

        <div class="queue-section">
            <h3>Job Queue</h3>
            <div id="job-queue">
                <div class="loading">Loading jobs...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3888/api';

        async function refreshDashboard() {
            try {
                // Fetch teams status
                const teamsResponse = await fetch(`${API_BASE}/jobs?limit=100`);
                const jobs = await teamsResponse.json();

                // Group by team
                const teams = {};
                jobs.forEach(job => {
                    if (!teams[job.team_name]) {
                        teams[job.team_name] = [];
                    }
                    teams[job.team_name].push(job);
                });

                // Render teams
                const teamsGrid = document.getElementById('teams-grid');
                teamsGrid.innerHTML = '';

                for (const [teamName, teamJobs] of Object.entries(teams)) {
                    const pending = teamJobs.filter(j => j.status === 'pending').length;
                    const inProgress = teamJobs.filter(j => j.status === 'in_progress').length;
                    const blocked = teamJobs.filter(j => j.status === 'blocked').length;
                    const completed = teamJobs.filter(j => j.status === 'complete').length;

                    const teamCard = document.createElement('div');
                    teamCard.className = 'team-card';
                    teamCard.innerHTML = `
                        <h2>${teamName}</h2>
                        <div style="margin-bottom: 15px; font-size: 14px; color: #666;">
                            <span style="margin-right: 15px;">
                                <strong style="color: #f59e0b;">${pending}</strong> Pending
                            </span>
                            <span style="margin-right: 15px;">
                                <strong style="color: #0284c7;">${inProgress}</strong> In Progress
                            </span>
                            <span style="margin-right: 15px;">
                                <strong style="color: #dc2626;">${blocked}</strong> Blocked
                            </span>
                            <span>
                                <strong style="color: #10b981;">${completed}</strong> Complete
                            </span>
                        </div>
                        <ul class="agents-list">
                            ${teamJobs.slice(0, 3).map(job => `
                                <li class="agent-item">
                                    <div class="agent-name">${job.title}</div>
                                    <div class="agent-status">
                                        Status: <span class="status-badge ${job.status}">${job.status}</span>
                                    </div>
                                </li>
                            `).join('')}
                        </ul>
                    `;
                    teamsGrid.appendChild(teamCard);
                }

                // Render job queue
                const jobQueue = document.getElementById('job-queue');
                jobQueue.innerHTML = jobs
                    .sort((a, b) => (b.priority || 0) - (a.priority || 0))
                    .slice(0, 10)
                    .map(job => `
                        <div class="job-item">
                            <div class="job-title">${job.title}</div>
                            <div class="job-team">${job.team_name}</div>
                            <div class="job-status">
                                Status: <span class="${job.status}">${job.status}</span>
                                ${job.blocked_reason ? ` — Blocked: ${job.blocked_reason}` : ''}
                            </div>
                        </div>
                    `).join('');

            } catch (error) {
                document.getElementById('error-container').innerHTML = `
                    <div class="error">Error loading dashboard: ${error.message}</div>
                `;
                console.error('Dashboard error:', error);
            }
        }

        // Load on page load and refresh every 10 seconds
        refreshDashboard();
        setInterval(refreshDashboard, 10000);
    </script>
</body>
</html>
